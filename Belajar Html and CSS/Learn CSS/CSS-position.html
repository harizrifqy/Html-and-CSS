<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
</head>
    <!-- Padding digunakan untuk memberikan jarak header
    ke content yang ada dibawah -->
    <body style="
    height: 3000px;
    padding-top: 100px; 
    ">  

    <!-- Position fixed berfungsi untuk membuat header tetap
    diposisi diatas ketika kita scroll kebawah -->

    <div style="
            background-color: black;
            color: white;
            position: fixed; 
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            ">header</div>

        <div style="
        background-color: lightblue;
        height: 200px;
        width: 200px;
        ">div1</div>

        <div style="
        background-color: lightpink;
        height: 200px;
        width: 200px;
        ">div2</div>
    </body>
</html>
